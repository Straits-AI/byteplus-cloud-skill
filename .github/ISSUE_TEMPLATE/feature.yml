name: Feature request
description: Suggest an improvement to the skill, tooling, packaging, or contributor experience.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: This issue contains no credentials, account identifiers, signed URLs, or customer data.
          required: true
